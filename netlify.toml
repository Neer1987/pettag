# Finder web app (QR profile pages) — not the Expo mobile app.
# Netlify: Site settings → Build & deploy should match this file.

[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
